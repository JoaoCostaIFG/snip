name: "ls"
version: 1
description: "Condensed ls output: truncates long listings"

match:
  command: "ls"

pipeline:
  - action: "strip_ansi"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 100
  - action: "head"
    n: 50
    overflow_msg: "... more files"

on_error: "passthrough"
