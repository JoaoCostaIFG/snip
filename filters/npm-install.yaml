name: "npm-install"
version: 2
description: "Condensed npm output: install summary and warnings"

match:
  command: "npm"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^npm warn deprecated|^npm notice|looking for funding|run .npm fund|^\\s*$)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"

on_error: "passthrough"
