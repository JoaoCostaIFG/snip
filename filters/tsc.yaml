name: "tsc"
version: 2
description: "Condensed tsc output: type errors with locations and summary"

match:
  command: "tsc"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "keep_lines"
    pattern: "(error TS\\d+|warning TS\\d+|Found \\d+ error|Errors\\s+Files|^\\s+\\d+\\s+)"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 40
    overflow_msg: "... more errors truncated"

on_error: "passthrough"
